<h2>Organ Matching Results</h2>

{% for match in matches %}

<p>
  Donor: {{ match.donor.donor.user.username }} → Receiver:
  {{match.receiver.receiver.user.username }}
</p>

<a href="{% url 'view_tracking' match.id %}"> Track Organ </a>

<br /><br />

{% empty %}

<p>No matches found.</p>

{% endfor %}
