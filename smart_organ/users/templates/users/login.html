<!doctype html>
<html>
  <head>
    <title>Login - Smart Organ Transplant</title>
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
      }
      .box {
        width: 400px;
        margin: 80px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
      button {
        padding: 10px;
        width: 100%;
        background: #007bff;
        color: white;
        border: none;
      }
      .errors {
        color: red;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Login</h2>

      <form method="POST">
        {% csrf_token %}

        <label>Username:</label>
        {{ form.username }}
        <div class="errors">{{ form.username.errors }}</div>

        <label>Password:</label>
        {{ form.password }}
        <div class="errors">{{ form.password.errors }}</div>

        <button type="submit">Login</button>
      </form>

      <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
  </body>
</html>
